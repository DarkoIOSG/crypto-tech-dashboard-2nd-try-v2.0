name: Daily Data Refresh

on:
  # 01:00 UTC = 09:00 Asia/Shanghai
  schedule:
    - cron: '0 1 * * *'
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      full_load:
        description: 'Run full initial load (all tokens from scratch)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'crypto-tech-dashboard/requirements-fetcher.txt'

      - name: Install dependencies
        working-directory: crypto-tech-dashboard
        run: pip install -r requirements-fetcher.txt

      - name: Run full initial load (manual trigger only)
        if: ${{ github.event.inputs.full_load == 'true' }}
        working-directory: crypto-tech-dashboard
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATA_DIR: /tmp/local_data
          HISTORY_DAYS: 2326
        run: python scripts/run_full_initial_load.py

      - name: Run daily update (scheduled / default)
        if: ${{ github.event.inputs.full_load != 'true' }}
        working-directory: crypto-tech-dashboard
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATA_DIR: /tmp/local_data
        run: python scripts/run_daily_update.py

      - name: Report status
        if: always()
        run: |
          echo "Workflow result: ${{ job.status }}"
          echo "Trigger: ${{ github.event_name }}"
